# pnpm v10 moved the `overrides` (and several other configs) from
# package.json's "pnpm" block to this file. Without this move, pnpm@10
# silently ignores the overrides while the lockfile still has them
# recorded — frozen-lockfile installs then fail with
# ERR_PNPM_LOCKFILE_CONFIG_MISMATCH.
#
# Source of truth for the consolidated overrides:
# https://pnpm.io/settings#overrides

overrides:
  glob: ">=10.5.0"
  jws: ">=3.2.3"
  js-yaml: ">=4.1.1"
  cookie: "1.1.1"
  diff: "8.0.4"
  serialize-javascript: "7.0.5"

# pnpm v10 sandboxes install scripts by default. Anything not listed
# here gets its postinstall skipped — and in CI (or any non-interactive
# context) that becomes ERR_PNPM_IGNORED_BUILDS instead of a warning.
# These three packages need their native-build / setup hooks to run.
onlyBuiltDependencies:
  - esbuild
  - msw
  - sharp
